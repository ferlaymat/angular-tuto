<mat-card class="example-card" appearance="outlined">
  <mat-card-header>
    <mat-card-title>{{task().title}}</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <p>
      {{task().priority}}
    </p>
  </mat-card-content>
  <mat-card-actions>
    <button matButton (click)="onMoveLeft()">←</button>
    <button matButton (click)="onMoveRight()">→</button>
    <button matButton (click)="onDelete()" color="warn">✕</button>
  </mat-card-actions>
</mat-card>
